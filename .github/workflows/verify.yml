name: Verify

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node and install deps
        uses: ./.github/workflows/setup-node

      - name: Run verification checks
        run: npm run verify
